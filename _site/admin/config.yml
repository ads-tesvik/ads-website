backend:
  name: git-gateway
  branch: main

media_folder: "src/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Yazıları"
    folder: "src/blog/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Başlık", name: "title", widget: "string"}
      - {label: "Yazar", name: "author", widget: "string", default: "ADS Ekibi"}
      - {label: "Kategori", name: "category", widget: "select", options: ["Yatırım Teşvik", "TÜBİTAK", "KOSGEB", "İhracat", "IPARD", "Mevzuat", "Genel"]}
      - {label: "Okuma Süresi", name: "read_time", widget: "string"}
      - {label: "Özet", name: "summary", widget: "text"}
      - {label: "Kapak Görseli", name: "image", widget: "image", required: false}
      - {label: "İçerik", name: "body", widget: "markdown"}
      - {label: "Yayın Tarihi", name: "date", widget: "datetime"}

  - name: "team"
    label: "Ekip Üyeleri"
    folder: "src/_data/team"
    create: true
    slug: "{{fields.name}}"
    fields:
      - {label: "Ad Soyad", name: "name", widget: "string"}
      - {label: "Ünvan", name: "title", widget: "string"}
      - {label: "Kategori", name: "category", widget: "select", options: ["Kurucu Ortak", "Kıdemli Uzman", "Uzman"]}
      - {label: "Biyografi", name: "bio", widget: "text"}
      - {label: "Uzmanlık Alanları", name: "expertise", widget: "list"}
      - {label: "Fotoğraf", name: "photo", widget: "image", required: false}
      - {label: "LinkedIn", name: "linkedin", widget: "string", required: false}
